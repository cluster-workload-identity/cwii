site_name: cwii
site_description: Cluster Workload Identity Injector — multi-cloud workload identity for self-hosted Kubernetes
site_url: https://cwii.dev
repo_url: https://github.com/cluster-workload-identity/cwii
repo_name: cluster-workload-identity/cwii
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Self-hosted OIDC setup: self-hosted-oidc.md
  - Providers:
      - GCP: gcp-setup.md
      - AWS: aws-setup.md
      - Azure: az-setup.md
  - Install: install.md
  - Annotations reference: annotations.md
  - Verification: verification.md
  - Observability: observability.md
  - Architecture: architecture.md
  - Releasing: releasing.md
  - End-to-end testing: e2e-testing.md
