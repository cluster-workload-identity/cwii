apiVersion: v2
name: cwii
description: |
  Cluster Workload Identity Injector — a multi-cloud Kubernetes mutating admission webhook that
  lets pods authenticate to GCP, AWS and Azure using their Kubernetes ServiceAccount tokens
  (workload identity federation), with no static keys.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.33.0-0 <1.37.0-0"
keywords:
  - workload-identity
  - oidc
  - gcp
  - aws
  - azure
  - webhook
  - admission-controller
home: https://cwii.dev
sources:
  - https://github.com/cluster-workload-identity/cwii
maintainers:
  - name: cwii maintainers
    url: https://github.com/cluster-workload-identity/cwii
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: security
# No `dependencies:` — cert-manager is assumed to be installed cluster-wide (its CRDs are not
# vendored here). When cert-manager is unavailable, set `tls.certManager.enabled=false` to use the
# built-in self-signed fallback.
