apiVersion: v1
kind: Service
metadata:
  name: {{ include "cwii.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cwii.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "cwii.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
