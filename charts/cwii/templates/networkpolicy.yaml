{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cwii.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cwii.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cwii.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow the API server to reach the webhook port. The API server source IP is not predictable,
    # so this permits the webhook port cluster-wide; tighten via `from` if your topology allows.
    - ports:
        - port: https
          protocol: TCP
{{- end }}
