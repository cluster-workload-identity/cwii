{{- if .Values.tls.certManager.enabled }}
# cert-manager path: the CA injector fills caBundle from the named Certificate's secret, so the
# chart must NOT set caBundle here.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "cwii.fullname" . }}
  labels:
    {{- include "cwii.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "cwii.certName" . }}
webhooks:
  {{- include "cwii.webhooks" (dict "ctx" . "caBundle" "") | nindent 2 }}
{{- end }}
