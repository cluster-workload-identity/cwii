version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]
    ignore:
      # Review major bumps manually (kube/k8s-openapi track Kubernetes API versions).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]

# Note: Dependabot has no Helm ecosystem. The chart has no subchart dependencies, so there is
# nothing for it to bump. If chart dependencies are added later, use Renovate (helmv3 manager).
