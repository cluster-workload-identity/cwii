name: release-please

# Automates versioning: release-please reads Conventional Commits on main, maintains a "release PR"
# with the computed SemVer bump + CHANGELOG, and on merge creates the `v<version>` git tag and
# GitHub Release. That tag triggers release.yaml (image + chart publish).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
