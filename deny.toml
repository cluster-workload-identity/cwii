# cargo-deny configuration. Run with `cargo deny check`.

[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2025-0134: rustls-pemfile is unmaintained (informational, not a vulnerability).
# It is pulled in only transitively via axum-server and kube-client, neither of which has migrated
# to rustls-pki-types yet, so no safe upgrade is available. Accept the unmaintained status until an
# upstream release drops the dependency.
# Note: `ignore` suppresses unmaintained advisories too, and works on every v2-era cargo-deny
# version — unlike the `[advisories].unmaintained` field, which was removed in 0.16.0 and only
# re-added in 0.18.2.
ignore = [
  { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; only a transitive dep of axum-server/kube-client, no safe upgrade available" },
]

[licenses]
version = 2
# Permissive licenses actually encountered in the dependency tree.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
