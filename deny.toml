# cargo-deny configuration. Run with `cargo deny check`.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses we accept across the dependency tree.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[[licenses.exceptions]]
# ring bundles its own license terms.
name = "ring"
allow = ["OpenSSL"]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
